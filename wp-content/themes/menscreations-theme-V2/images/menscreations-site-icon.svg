<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A87828;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="96"/>

  <!-- Outer diamond frame -->
  <polygon points="256,48 464,256 256,464 48,256"
    fill="none" stroke="url(#goldGrad)" stroke-width="6" filter="url(#glow)"/>

  <!-- Inner diamond accent -->
  <polygon points="256,90 422,256 256,422 90,256"
    fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner dots at diamond tips -->
  <circle cx="256" cy="48"  r="5" fill="#F0D080" opacity="0.9"/>
  <circle cx="464" cy="256" r="5" fill="#F0D080" opacity="0.9"/>
  <circle cx="256" cy="464" r="5" fill="#F0D080" opacity="0.9"/>
  <circle cx="48"  cy="256" r="5" fill="#F0D080" opacity="0.9"/>

  <!-- Bold M letterform centered -->
  <polyline
    points="128,340 128,188 256,296 384,188 384,340"
    fill="none"
    stroke="url(#goldGrad)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Thin baseline rule -->
  <line x1="128" y1="355" x2="384" y2="355" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>

  <!-- "MC" subtle tagline below baseline -->
  <text
    x="256" y="400"
    text-anchor="middle"
    font-family="'Georgia', serif"
    font-size="28"
    font-weight="400"
    letter-spacing="18"
    fill="#C9A84C"
    opacity="0.7"
  >CREATIONS</text>
</svg>
